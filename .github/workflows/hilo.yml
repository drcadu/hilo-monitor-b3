name: HiLo Monitor B3

on:
  schedule:
    # Roda de seg a sex às 18:30 BRT (21:30 UTC)
    - cron: "30 21 * * 1-5"
  workflow_dispatch:   # permite rodar manualmente pelo celular

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar HiLo Monitor
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
        run: python hilo_monitor.py
